<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>東歐之旅 | 旅遊助手</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #f8fafc; }
        .app-container { max-width: 500px; margin: 0 auto; min-height: 100vh; padding-bottom: 80px; }
        .glass-card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; }
        .nav-item.active { color: #38bdf8; }
    </style>
</head>
<body>
    <div id="app" class="app-container p-4">
        <header class="flex justify-between items-center mb-6 px-2">
            <div>
                <h1 class="text-2xl font-bold text-blue-400">布拉格之旅</h1>
                <p class="text-sm text-slate-400">2026年3月15日 · 晴天 8°C</p>
            </div>
            <div class="text-3xl text-yellow-400"><i class="fas fa-sun"></i></div>
        </header>

        <main>
            <section v-if="activeTab === 'itinerary'" class="space-y-4">
                <h2 class="text-lg font-semibold mb-3">今日行程</h2>
                <div v-for="item in itinerary" :key="item.time" class="glass-card p-4 flex gap-4">
                    <div class="text-blue-400 font-mono text-sm">{{ item.time }}</div>
                    <div>
                        <h3 class="font-medium">{{ item.title }}</h3>
                        <p class="text-xs text-slate-400">{{ item.location }}</p>
                        <button @click="openMap(item.location)" class="mt-2 text-xs text-blue-300 underline">
                            <i class="fas fa-location-arrow"></i> Google Maps 導航
                        </button>
                    </div>
                </div>
            </section>

            <section v-if="activeTab === 'map'" class="space-y-4">
                <div class="glass-card w-full h-96 flex flex-col items-center justify-center p-6 text-center">
                    <i class="fas fa-map-marked-alt text-5xl mb-4 text-blue-500"></i>
                    <p>點擊下方按鈕直接開啟 Google Maps 查看完整路線</p>
                    <a href="https://www.google.com/maps" target="_blank" class="mt-4 bg-blue-600 px-6 py-2 rounded-full font-bold">開啟地圖</a>
                </div>
            </section>

            <section v-if="activeTab === 'budget'" class="space-y-4">
                <div class="glass-card p-6 mb-4">
                    <p class="text-sm text-slate-400">總支出 (HKD)</p>
                    <h2 class="text-3xl font-bold text-blue-400">${{ totalExpenses }}</h2>
                </div>
                
                <div class="glass-card p-4">
                    <div class="grid grid-cols-2 gap-2 mb-4">
                        <input v-model="newExpense.item" placeholder="項目" class="bg-slate-800 p-2 rounded text-sm">
                        <input v-model.number="newExpense.amount" type="number" placeholder="金額" class="bg-slate-800 p-2 rounded text-sm">
                        <select v-model="newExpense.type" class="bg-slate-800 p-2 rounded text-sm col-span-2">
                            <option value="現金">💵 現金 (Cash)</option>
                            <option value="信用卡">💳 信用卡 (Credit Card)</option>
                        </select>
                    </div>
                    <button @click="addExpense" class="w-full bg-blue-600 p-2 rounded-lg font-bold">記錄支出</button>
                </div>

                <div class="space-y-2">
                    <div v-for="exp in expenses" :key="exp.id" class="glass-card p-3 flex justify-between items-center text-sm">
                        <span>{{ exp.item }} <span class="text-xs text-slate-500">({{ exp.type }})</span></span>
                        <span class="font-bold text-red-400">-${{ exp.amount }}</span>
                    </div>
                </div>
            </section>

            <section v-if="activeTab === 'shopping'" class="space-y-4">
                <h2 class="text-lg font-semibold">必買清單</h2>
                <div class="glass-card p-4">
                    <div class="flex gap-2 mb-4">
                        <input v-model="newItem" @keyup.enter="addItem" placeholder="新增清單..." class="flex-1 bg-slate-800 p-2 rounded">
                        <button @click="addItem" class="bg-blue-600 px-4 rounded">+</button>
                    </div>
                    <div v-for="item in shoppingList" :key="item.id" class="flex items-center gap-3 p-2 border-b border-slate-700">
                        <input type="checkbox" v-model="item.done" class="w-5 h-5 rounded border-blue-500">
                        <span :class="{'line-through text-slate-500': item.done}">{{ item.text }}</span>
                    </div>
                </div>
            </section>
        </main>

        <nav class="fixed bottom-0 left-0 right-0 glass-card mx-4 mb-4 p-3 flex justify-around items-center">
            <button @click="activeTab = 'itinerary'" :class="['nav-item flex flex-col items-center', {active: activeTab === 'itinerary'}]">
                <i class="fas fa-calendar-alt text-xl"></i><span class="text-[10px] mt-1">行程</span>
            </button>
            <button @click="activeTab = 'map'" :class="['nav-item flex flex-col items-center', {active: activeTab === 'map'}]">
                <i class="fas fa-map text-xl"></i><span class="text-[10px] mt-1">地圖</span>
            </button>
            <button @click="activeTab = 'budget'" :class="['nav-item flex flex-col items-center', {active: activeTab === 'budget'}]">
                <i class="fas fa-wallet text-xl"></i><span class="text-[10px] mt-1">記帳</span>
            </button>
            <button @click="activeTab = 'shopping'" :class="['nav-item flex flex-col items-center', {active: activeTab === 'shopping'}]">
                <i class="fas fa-shopping-bag text-xl"></i><span class="text-[10px] mt-1">清單</span>
            </button>
        </nav>
    </div>

    <script>
        const { createApp, ref, computed } = Vue;
        createApp({
            setup() {
                const activeTab = ref('itinerary');
                const itinerary = ref([
                    { time: '09:00', title: '查理大橋', location: 'Charles Bridge, Prague' },
                    { time: '12:00', title: '地道捷克午餐', location: 'U Parlamentu, Prague' },
                    { time: '14:30', title: '布拉格城堡', location: 'Prague Castle' }
                ]);

                // 記帳
                const expenses = ref([
                    { id: 1, item: '機票', amount: 8500, type: '信用卡' },
                    { id: 2, item: '咖啡', amount: 45, type: '現金' }
                ]);
                const newExpense = ref({ item: '', amount: null, type: '現金' });
                const totalExpenses = computed(() => expenses.value.reduce((sum, e) => sum + e.amount, 0));
                const addExpense = () => {
                    if (newExpense.value.item && newExpense.value.amount) {
                        expenses.value.unshift({ ...newExpense.value, id: Date.now() });
                        newExpense.value.item = ''; newExpense.value.amount = null;
                    }
                };

                // 購物清單
                const shoppingList = ref([{ id: 1, text: '溫泉杯', done: false }]);
                const newItem = ref('');
                const addItem = () => {
                    if (newItem.value) {
                        shoppingList.value.push({ id: Date.now(), text: newItem.value, done: false });
                        newItem.value = '';
                    }
                };

                const openMap = (loc) => {
                    window.open(`https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(loc)}`, '_blank');
                };

                return { activeTab, itinerary, expenses, newExpense, totalExpenses, addExpense, shoppingList, newItem, addItem, openMap };
            }
        }).mount('#app');
    </script>
</body>
</html>
